name: Supply Chain
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs:
      run-code-scanning:
        default: true
        type: boolean
        required: false
      codeql-code-scanning-category:
        default: codeql-code-scanning
        type: string
        required: false
      codeql-code-scanning-config-file:
        default:
        type: string
        required: false
      codeql-go-version:
        type: string
        required: false
      codeql-java-version:
        default: 17
        type: string
        required: false
      codeql-java-cache:
        default:
        type: string
        required: false
      codeql-java-distribution:
        default: adopt
        type: string
        required: false
      code-scanning-timeout-minutes:
        default: 10
        type: number
        required: false
      trivy-code-scanning-category:
        default: trivy-code-scanning
        type: string
        required: false
    secrets: {}
jobs:
  validate:
    name: Validate
    if: failure()
    runs-on: ubuntu-slim
    permissions: {}
    needs:
      - dependency-review
      - code-scanning
    # temparary disable trivy until this is fixed
    # https://github.com/aquasecurity/trivy-action/issues/541
    #  - trivy
    steps:
      - run: exit 1
        name: "Catch errors"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04

    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  code-scanning:
    name: CodeQL Scan
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.code-scanning-timeout-minutes }}
    if: ${{ inputs.run-code-scanning == true && github.event_name != 'pull_request' }}
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Configure access to internal and private GitHub repos
        run: git config --global url."https://${{ secrets.REVIEWBOT_GITHUB_TOKEN }}:x-oauth-basic@github.com/coopnorge".insteadOf "https://github.com/coopnorge"
      - uses: actions/checkout@v6
        with:
          repository: coopnorge/github-workflow-supply-chain-security-validation
          sparse-checkout: |
            docker-compose.yaml
          path: .tmp-github-workflow-supply-chain-security-validation
      - name: Detected Languages
        id: detected-languages
        run: |
          set -euo pipefail
          DOCKER_COMPOSE_PATH=$(mktemp ./docker-compose.XXXXXXXXXX.yaml)
          mv ".tmp-github-workflow-supply-chain-security-validation/docker-compose.yaml" "$DOCKER_COMPOSE_PATH"
          export USER_ID=$(id -u) && export GROUP_ID=$(id -g)
          echo "languages=$(docker compose -f $DOCKER_COMPOSE_PATH run --rm linguist | awk '{print $3}' | paste -sd ',' -)" >> $GITHUB_OUTPUT
          rm "$DOCKER_COMPOSE_PATH"
          rm -rf ".tmp-github-workflow-supply-chain-security-validation"
      - uses: actions/github-script@v9
        name: Get CodeQL supported languages
        id: languages
        with:
          result-encoding: json
          script: |
            const linguistCodeQLMapping = {
              'c#': 'csharp',
            };
            function getCodeQLLanguage(linguistLang) {
              if (linguistLang in linguistCodeQLMapping) {
                return linguistCodeQLMapping[linguistLang];
              }
              return linguistLang;
            }
            const detectedLanguages = '${{ steps.detected-languages.outputs.languages }}'.toLowerCase().split(',').map(language => {
              return getCodeQLLanguage(language)
            });

            // Always scan for actions
            // linguist does not find GitHub actions and they always exist if this workflow is running
            // So, always add it.
            detectedLanguages.push('actions');

            const codeqlLanguages = ['c', 'cpp', 'csharp', 'go', 'python', 'java', 'javascript', 'typescript', 'actions', 'kotlin', 'scala'];
            const languages = detectedLanguages.filter(language => codeqlLanguages.includes(language));
            return languages.join(',');

      - name: "Determine Go version"
        run: |
          if [ -z "${{ inputs.codeql-go-version }}" ]; then
            echo "GO_VERSION=stable" >> $GITHUB_ENV
            echo "GO_CHECK_LATEST=true" >> $GITHUB_ENV
          else
            echo "GO_VERSION=${{ inputs.codeql-go-version }}" >> $GITHUB_ENV
            echo "GO_CHECK_LATEST=false" >> $GITHUB_ENV
          fi
      - name: Set Go version
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: ${{ env.GO_CHECK_LATEST }}
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Set Java version
        if: contains(steps.languages.outputs.result, 'java') || contains(steps.languages.outputs.result, 'scala') || contains(steps.languages.outputs.result, 'kotlin')
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.codeql-java-distribution }}
          java-version: ${{ inputs.codeql-java-version }}
          cache: ${{ inputs.codeql-java-cache }}
      - name: Setup Maven settings
        if: ${{ env.MAVEN_SETTINGS != '' }}
        env:
          MAVEN_SETTINGS: ${{ secrets.MAVEN_SETTINGS_BASE64 }}
        run: |
          mkdir -p ~/.m2
          echo $MAVEN_SETTINGS | base64 -d > ~/.m2/settings.xml

      - name: Initialize CodeQL
        if: steps.languages.outputs.result != '""'
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          config-file: ${{ inputs.codeql-code-scanning-config-file }}
          languages: ${{ fromJSON(steps.languages.outputs.result) }}
      - name: Add coopnorge Nuget source
        if: contains(steps.languages.outputs.result, 'csharp')
        run: |
          dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/coopnorge/index.json"
      - name: Autobuild
        if: steps.languages.outputs.result != '""'
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      - name: Perform CodeQL Analysis
        if: steps.languages.outputs.result != '""'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: ${{ inputs.codeql-code-scanning-category }}

  # temparary disable trivy until this is fixed
  # https://github.com/aquasecurity/trivy-action/issues/541
